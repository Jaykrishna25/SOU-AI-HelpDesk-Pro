version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sou-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sou_admin
      POSTGRES_PASSWORD: sou_secret
      POSTGRES_DB: sou_helpdesk
    ports:
      - "5432:5432"
    volumes:
      - sou_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sou_admin -d sou_helpdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sou-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://sou_admin:sou_secret@db:5432/sou_helpdesk?schema=public"
      JWT_ACCESS_SECRET: "docker-access-secret"
      JWT_REFRESH_SECRET: "docker-refresh-secret"
      PORT: "5001"
      CORS_ORIGIN: "http://localhost:3000"
      ADMIN_RESPONSE_SLA_HOURS: "48"
    ports:
      - "5001:5001"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5001/api"
    container_name: sou-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  sou_pgdata:
